version: '3.8'

services:
  quimresa-app:
    image: tu-registro/quimresa-app:latest # Cambia esto si subes la imagen a un registro
    # build: . # Portainer Swarm no soporta builds locales fácilmente, mejor subir imagen o usar git
    environment:
      - DATABASE_URL=postgresql://postgres:9db5e5a64387efaa96264ebd79551fd9@postgres:5432/quimresa?schema=public
      - JWT_SECRET=parangaricutirimicuaro
      - PORT=3001
    networks:
      - traefik_public
      - general_network
    deploy:
      mode: replicated
      replicas: 1
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=traefik_public"
        - "traefik.http.routers.quimresa.rule=Host(`lab.quimresa.com`)" # CAMBIA ESTO por tu dominio
        - "traefik.http.routers.quimresa.entrypoints=websecure"
        - "traefik.http.routers.quimresa.tls=true"
        - "traefik.http.routers.quimresa.tls.certresolver=le"
        - "traefik.http.services.quimresa.loadbalancer.server.port=3001"
      placement:
        constraints:
          - node.role == manager

networks:
  traefik_public:
    external: true
  general_network:
    external: true
